<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 | Global Community Map</title>
    <style>
        :root { --brand-blue: #00d2ff; --dark-bg: #0b0e14; }
        body { background-color: var(--dark-bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .stats-grid { display: flex; gap: 40px; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 20px 40px; border-radius: 50px; border: 1px solid rgba(0,210,255,0.3); }
        .num { font-size: 2.5rem; font-weight: bold; color: var(--brand-blue); display: block; text-align: center; }
        .label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.7; }
        .map-container { position: relative; width: 100%; max-width: 1100px; background: rgba(255,255,255,0.02); border-radius: 20px; padding: 10px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .base-map { width: 100%; display: block; opacity: 0.3; filter: invert(1); pointer-events: none; }
        .ping { position: absolute; width: 6px; height: 6px; background-color: var(--brand-blue); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px var(--brand-blue); }
        .ping::after { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid var(--brand-blue); border-radius: 50%; animation: pulse 2.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <h1>WCB 2026 Global Reach</h1>
    
    <div class="stats-grid">
        <div style="text-align:center">
            <span class="num" id="count-attendees">0</span>
            <span class="label">Registrants</span>
        </div>
        <div style="text-align:center">
            <span class="num" id="count-countries">0</span>
            <span class="label">Countries</span>
        </div>
    </div>

    <div class="map-container" id="map-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" class="base-map">
    </div>

    <script>
        // Use a proxy to bypass Google's "No-CORS" policy
        const rawCsvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOjDCF8O1kJoBoigy8sl3lRLMvxVOSvg-scxdb5C1hv3usB6uwGZR9CP97fLs_E_GdNhHXidpi7Gv8/pub?output=csv';
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawCsvUrl)}&t=${new Date().getTime()}`;

        const hubs = {
            'Vancouver': { lat: 49.28, lng: -123.12 }, 'Calgary': { lat: 51.04, lng: -114.07 },
            'Edmonton': { lat: 53.54, lng: -113.49 }, 'Ottawa': { lat: 45.42, lng: -75.69 },
            'Montreal': { lat: 45.50, lng: -73.56 }, 'Toronto': { lat: 43.65, lng: -79.38 },
            'Boston': { lat: 42.36, lng: -71.05 }, 'New York': { lat: 40.71, lng: -74.00 },
            'London': { lat: 51.50, lng: -0.12 }, 'Zurich': { lat: 47.37, lng: 8.54 },
            'Tokyo': { lat: 35.67, lng: 139.65 }, 'Seoul': { lat: 37.56, lng: 126.97 },
            'Sydney': { lat: -33.86, lng: 151.20 }, 'Eindhoven': { lat: 51.44, lng: 5.46 },
            'Daejeon': { lat: 36.35, lng: 127.38 }, 'Ames': { lat: 42.03, lng: -93.63 },
            'Iowa City': { lat: 41.66, lng: -91.53 }, 'Pittsburgh': { lat: 40.44, lng: -79.99 },
            'Ann Arbor': { lat: 42.28, lng: -83.74 }, 'Leeds': { lat: 53.80, lng: -1.54 },
            'Bern': { lat: 46.94, lng: 7.44 }, 'Goesan': { lat: 36.81, lng: 127.79 },
            'Koblenz': { lat: 50.35, lng: 7.58 }, 'Galway': { lat: 53.27, lng: -9.05 },
            'Bath': { lat: 51.37, lng: -2.35 }, 'Providence': { lat: 41.82, lng: -71.41 },
            'Cleveland': { lat: 41.49, lng: -81.69 }, 'Morgantown': { lat: 39.62, lng: -79.95 },
            'Braunschweig': { lat: 52.26, lng: 10.52 }, 'Nottingham': { lat: 52.95, lng: -1.15 },
            'Blacksburg': { lat: 37.22, lng: -80.41 }, 'East Lansing': { lat: 42.73, lng: -84.48 },
            'Tel Aviv': { lat: 32.08, lng: 34.78 }, 'Burnaby': { lat: 49.24, lng: -122.98 }
        };

        function getPos(city) {
            const data = hubs[city];
            if (!data) return null;
            const vScale = 0.42; const eOffset = 42; 
            const vShift = 4.2; const hShift = -2.6; 
            return {
                t: eOffset - (data.lat * vScale) + vShift,
                l: ((data.lng + 180) * (100 / 360)) + hShift
            };
        }

        async function loadData() {
            try {
                const res = await fetch(proxyUrl);
                const data = await res.json();
                const csv = data.contents;
                
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                const countries = new Set();
                const mapArea = document.getElementById('map-area');

                lines.forEach(line => {
                    const columns = line.split(',').map(s => s?.trim());
                    const city = columns[0];
                    const country = columns[1];

                    if (city && hubs[city]) {
                        countries.add(country);
                        const pos = getPos(city);
                        if (pos) {
                            const dot = document.createElement('div');
                            dot.className = 'ping';
                            dot.style.top = pos.t + '%';
                            dot.style.left = pos.l + '%';
                            dot.title = `${city}, ${country}`;
                            mapArea.appendChild(dot);
                        }
                    } else if (country) {
                        countries.add(country);
                    }
                });

                document.getElementById('count-attendees').innerText = lines.length;
                document.getElementById('count-countries').innerText = countries.size;
            } catch (e) {
                console.error("Fetch Error:", e);
            }
        }
        loadData();
    </script>
</body>
</html>
