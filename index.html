<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 Map</title>
    <style>
        :root { --brand-blue: #00d2ff; --dark-bg: #0b0e14; }
        body { background: var(--dark-bg); color: white; font-family: sans-serif; text-align: center; padding: 40px; }
        .stats { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; }
        .num { font-size: 3rem; color: var(--brand-blue); font-weight: bold; display: block; }
        .map-container { position: relative; width: 100%; max-width: 1000px; margin: auto; border: 1px solid #333; border-radius: 15px; }
        .base-map { width: 100%; opacity: 0.3; filter: invert(1); }
        .ping { position: absolute; width: 8px; height: 8px; background: var(--brand-blue); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px var(--brand-blue); }
        .ping::after { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid var(--brand-blue); border-radius: 50%; animation: p 2.5s infinite; }
        @keyframes p { 0% {transform: scale(1); opacity:1;} 100% {transform: scale(4); opacity:0;} }
        #debug-msg { color: #ff4444; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <h1>WCB 2026 Global Community</h1>
    <div class="stats">
        <div><span class="num" id="count-a">0</span>Registrants</div>
        <div><span class="num" id="count-c">0</span>Countries</div>
    </div>

    <div class="map-container" id="map-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" class="base-map">
    </div>
    <div id="debug-msg"></div>

    <script>
        // THE DATA SOURCE
        const sheetId = '2PACX-1vSOjDCF8O1kJoBoigy8sl3lRLMvxVOSvg-scxdb5C1hv3usB6uwGZR9CP97fLs_E_GdNhHXidpi7Gv8';
        const csvUrl = `https://docs.google.com/spreadsheets/d/e/${sheetId}/pub?output=csv`;
        
        // CITIES LIST
        const hubs = {
            'Vancouver': { lat: 49.28, lng: -123.12 }, 'Calgary': { lat: 51.04, lng: -114.07 },
            'Edmonton': { lat: 53.54, lng: -113.49 }, 'Ottawa': { lat: 45.42, lng: -75.69 },
            'Montreal': { lat: 45.50, lng: -73.56 }, 'Toronto': { lat: 43.65, lng: -79.38 },
            'London': { lat: 51.50, lng: -0.12 }, 'Zurich': { lat: 47.37, lng: 8.54 },
            'Tokyo': { lat: 35.67, lng: 139.65 }, 'Seoul': { lat: 37.56, lng: 126.97 },
            'Sydney': { lat: -33.86, lng: 151.20 }, 'Eindhoven': { lat: 51.44, lng: 5.46 }
        };

        function getPos(city) {
            const data = hubs[city];
            if (!data) return null;
            return {
                t: 42 - (data.lat * 0.42) + 4.2,
                l: ((data.lng + 180) * (100 / 360)) - 2.6
            };
        }

        async function loadData() {
            const debug = document.getElementById('debug-msg');
            try {
                // Using a direct fetch first, with a cache-buster
                const response = await fetch(csvUrl + '&cache=' + Date.now());
                if (!response.ok) throw new Error("Google blocked the request");
                
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
                
                if (lines.length === 0) {
                    debug.innerText = "Connected, but the spreadsheet appears to be empty.";
                    return;
                }

                const countries = new Set();
                lines.forEach(line => {
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const city = cols[0];
                    const country = cols[1];

                    if (country) countries.add(country);
                    if (city && hubs[city]) {
                        const pos = getPos(city);
                        const dot = document.createElement('div');
                        dot.className = 'ping';
                        dot.style.top = pos.t + '%';
                        dot.style.left = pos.l + '%';
                        dot.title = city;
                        document.getElementById('map-area').appendChild(dot);
                    }
                });

                document.getElementById('count-a').innerText = lines.length;
                document.getElementById('count-c').innerText = countries.size;
                debug.innerText = "Data loaded successfully!";

            } catch (err) {
                console.error(err);
                debug.innerText = "Error: Could not pull data. Ensure 'Publish to Web' is set to CSV in Google Sheets.";
            }
        }
        loadData();
    </script>
</body>
</html>
