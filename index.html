<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 | Global Reach</title>
    <style>
        :root { 
            --brand-blue: #00d2ff; 
            --dark-bg: #1a1d23; 
        }
        
        body { 
            background-color: var(--dark-bg); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 40px 20px; text-align: center; 
        }

        .action-container { margin-bottom: 30px; }
        .reg-button {
            display: inline-block;
            background: #0984e3;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
            border: 2px solid rgba(255,255,255,0.1);
        }

        .stats-grid { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .num { font-size: 2.5rem; font-weight: bold; color: var(--brand-blue); display: block; }
        .label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.7; }

        /* THE FIX: Fixed aspect ratio container */
        #map-wrapper {
            position: relative;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            background: #0b0e14;
            border: 1px solid rgba(255,255,255,0.1);
            /* This ensures the container has height even before the image loads */
            aspect-ratio: 2 / 1; 
        }

        #map-image { 
            width: 100%; 
            height: 100%;
            object-fit: cover;
            display: block; 
            opacity: 0.8; 
        }

        #dots-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; /* Allows clicking through to image if needed */
        }

        .ping {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: var(--brand-blue);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px var(--brand-blue);
            z-index: 10;
        }

        .ping::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: inherit;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>WCB 2026 Global Community</h1>

    <div class="action-container">
        <a href="YOUR_LINK_HERE" target="_blank" class="reg-button">Join the Map & Register →</a>
    </div>
    
    <div class="stats-grid">
        <div class="stat-card"><span class="num" id="count-attendees">0</span><span class="label">Registrants</span></div>
        <div class="stat-card"><span class="num" id="count-countries">0</span><span class="label">Countries</span></div>
    </div>

    <div id="map-wrapper">
        <img id="map-image" src="https://upload.wikimedia.org/wikipedia/commons/b/b3/Robinson_projection_SW.jpg" alt="World Map">
        <div id="dots-layer"></div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOjDCF8O1kJoBoigy8sl3lRLMvxVOSvg-scxdb5C1hv3usB6uwGZR9CP97fLs_E_GdNhHXidpi7Gv8/pub?output=csv';

        const hubs = {
            'Vancouver': [49.28, -123.12], 'Calgary': [51.04, -114.07], 'Edmonton': [53.54, -113.49],
            'Ottawa': [45.42, -75.69], 'Montreal': [45.50, -73.56], 'Toronto': [43.65, -79.38],
            'Fredericton': [45.96, -66.64], 'Moncton': [46.08, -64.77], 'Halifax': [44.64, -63.57],
            'Lethbridge': [49.69, -112.84], 'Burnaby': [49.24, -122.98], 'Boston': [42.36, -71.05],
            'New York': [40.71, -74.00], 'Newark': [40.73, -74.17], 'Chicago': [41.87, -87.62],
            'Stanford': [37.42, -122.17], 'Seattle': [47.60, -122.33], 'San Diego': [32.71, -117.16],
            'Los Angeles': [34.05, -118.24], 'Atlanta': [33.74, -84.38], 'Austin': [30.26, -97.74],
            'Pittsburgh': [40.44, -79.99], 'Ann Arbor': [42.28, -83.74], 'Ames': [42.03, -93.63],
            'Iowa City': [41.66, -91.53], 'Madison': [43.07, -89.40], 'Eugene': [44.05, -123.08],
            'Salt Lake City': [40.76, -111.89], 'Denver': [39.73, -104.99], 'Philadelphia': [39.95, -75.16],
            'London': [51.50, -0.12], 'Zurich': [47.37, 8.54], 'Paris': [48.85, 2.35],
            'Amsterdam': [52.36, 4.90], 'Eindhoven': [51.44, 5.46], 'Maastricht': [50.85, 5.69],
            'Delft': [52.01, 4.35], 'Berlin': [52.52, 13.40], 'Munich': [48.13, 11.58],
            'Stuttgart': [48.77, 9.18], 'Milan': [45.46, 9.18], 'Rome': [41.90, 12.49],
            'Barcelona': [41.38, 2.17], 'Madrid': [40.41, -3.70], 'Vienna': [48.20, 16.37],
            'Bern': [46.94, 7.44], 'Lausanne': [46.51, 6.63], 'Leuven': [50.87, 4.70],
            'Galway': [53.27, -9.05], 'Dublin': [53.34, -6.26], 'Leeds': [53.80, -1.54],
            'Sheffield': [53.38, -1.47], 'Tokyo': [35.67, 139.65], 'Kyoto': [35.01, 135.76],
            'Sapporo': [43.06, 141.35], 'Seoul': [37.56, 126.97], 'Daejeon': [36.35, 127.38],
            'Singapore': [1.35, 103.81], 'Sydney': [-33.86, 151.20], 'Melbourne': [-37.81, 144.96],
            'Auckland': [-36.84, 174.76], 'Taipei': [25.03, 121.56], 'Wuhan': [30.59, 114.30],
            'Hong Kong': [22.31, 114.16], 'Beijing': [39.90, 116.40], 'Exeter': [50.71, -3.53],
            'Gwangju': [35.16, 126.85], 'Sendai': [38.26, 140.86], 'Innsbruck': [47.26, 11.40],
            'Erlangen': [49.58, 11.00], 'Goesan': [36.81, 127.79], 'Koblenz': [50.35, 7.58],
            'Bath': [51.37, -2.35], 'Providence': [41.82, -71.41], 'Cleveland': [41.49, -81.69],
            'Morgantown': [39.62, -79.95], 'Braunschweig': [52.26, 10.52], 'Nottingham': [52.95, -1.15],
            'Blacksburg': [37.22, -80.41], 'East Lansing': [42.73, -84.48], 'Tel Aviv': [32.08, 34.78]
        };

        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                const csv = await res.text();
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                
                const countries = new Set();
                let attendeeCount = 0;
                const processedCities = new Set();

                lines.forEach(line => {
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const city = cols[0];
                    const country = cols[1];

                    if (city || country) attendeeCount++;
                    if (country) countries.add(country);

                    if (hubs[city] && !processedCities.has(city)) {
                        const [lat, lng] = hubs[city];
                        
                        // Robinson Calibration
                        const hShift = -2.1;
                        const vShift = 2.5;
                        const vScale = 0.44;

                        const left = ((lng + 180) * (100 / 360)) + hShift;
                        const top = 42 - (lat * vScale) + vShift;

                        const dot = document.createElement('div');
                        dot.className = 'ping';
                        dot.style.left = left + '%';
                        dot.style.top = top + '%';
                        document.getElementById('dots-layer').appendChild(dot);
                        
                        processedCities.add(city);
                    }
                });

                document.getElementById('count-attendees').innerText = attendeeCount;
                document.getElementById('count-countries').innerText = countries.size;

            } catch (e) { console.error(e); }
        }

        loadData();
    </script>
</body>
</html>
