<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 Global Map</title>
    <style>
        :root { --brand-blue: #00d2ff; --dark-bg: #0b0e14; }
        body { background-color: var(--dark-bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .stats-grid { display: flex; gap: 30px; margin-bottom: 20px; }
        .num { font-size: 3rem; color: var(--brand-blue); font-weight: bold; display: block; text-align: center;}
        .map-container { position: relative; width: 100%; max-width: 900px; border: 1px solid #333; border-radius: 15px; overflow: hidden; }
        .base-map { width: 100%; opacity: 0.3; filter: invert(1); }
        .ping { position: absolute; width: 10px; height: 10px; background: var(--brand-blue); border-radius: 50%; transform: translate(-50%, -50%); }
        .ping::after { content: ''; position: absolute; width: 100%; height: 100%; border: 1px solid var(--brand-blue); border-radius: 50%; animation: p 2s infinite; }
        @keyframes p { 0% {transform: scale(1); opacity:1;} 100% {transform: scale(4); opacity:0;} }
    </style>
</head>
<body>

    <h1>WCB 2026 Community</h1>
    <div class="stats-grid">
        <div><span class="num" id="count-a">0</span><span>Attendees</span></div>
        <div><span class="num" id="count-c">0</span><span>Countries</span></div>
    </div>

    <div class="map-container" id="map-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg" class="base-map">
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOjDCF8O1kJoBoigy8sl3lRLMvxVOSvg-scxdb5C1hv3usB6uwGZR9CP97fLs_E_GdNhHXidpi7Gv8/pub?output=csv';

        function getPos(city) {
            const hubs = {
                'Vancouver': { t: 31, l: 16 },
                'Calgary': { t: 32, l: 19 },
                'London': { t: 28, l: 46 },
                'Zurich': { t: 32, l: 49 },
                'Tokyo': { t: 38, l: 85 }
            };
            return hubs[city] || { t: 45 + Math.random()*10, l: 45 + Math.random()*10 };
        }

        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                const csv = await res.text();
                const lines = csv.split('\n').slice(1);
                const countries = new Set();

                lines.forEach(line => {
                    const [city, country] = line.split(',').map(s => s?.trim());
                    if (city) {
                        countries.add(country);
                        const pos = getPos(city);
                        const dot = document.createElement('div');
                        dot.className = 'ping';
                        dot.style.top = pos.t + '%';
                        dot.style.left = pos.l + '%';
                        dot.title = city;
                        document.getElementById('map-area').appendChild(dot);
                    }
                });

                document.getElementById('count-a').innerText = lines.length;
                document.getElementById('count-c').innerText = countries.size;
            } catch (e) { console.error("Error:", e); }
        }
        loadData();
    </script>
</body>
</html>
