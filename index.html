<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 | Global Community</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --brand-blue: #0984e3; 
            --accent-blue: #00d2ff; 
            --bg-light: #f4f7f9; 
        }
        
        body { 
            background-color: var(--bg-light); 
            color: #2d3436; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; padding: 40px 20px; text-align: center; 
        }

        /* Registration Button Area */
        .action-container { margin: 20px auto 40px; }
        .reg-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--brand-blue) 0%, var(--accent-blue) 100%);
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(9, 132, 227, 0.3);
            transition: all 0.3s ease;
            border: 2px solid white;
        }
        .reg-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(0, 210, 255, 0.5);
            filter: brightness(1.1);
        }
        .sub-text { margin-top: 15px; font-size: 0.9rem; color: #636e72; font-style: italic; }

        /* Stats Cards */
        .stats-grid { display: flex; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .stat-card {
            background: white;
            padding: 20px 35px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,210,255,0.1);
            min-width: 160px;
        }
        .num { font-size: 3rem; font-weight: 800; color: var(--brand-blue); display: block; line-height: 1; margin-bottom: 5px;}
        .label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: #636e72; font-weight: 600; }

        /* Map Container */
        #map { 
            height: 650px; width: 100%; max-width: 1150px; margin: auto; 
            border-radius: 30px; 
            background: #e0e0e0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 10px solid white;
            z-index: 1; /* Keeps map base low */
        }

        /* HIGH-VISIBILITY PING MARKER */
        .ping-marker {
            background: #d63031; /* Vibrant Red/Coral for maximum contrast on light map */
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(214, 48, 49, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(214, 48, 49, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .leaflet-tooltip {
            background: #2d3436 !important;
            color: white !important;
            border: none !important;
            border-radius: 8px;
            padding: 10px 15px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 10000;
        }
    </style>
</head>
<body>

    <h1 style="font-weight: 300; font-size: 2.5rem; margin-bottom: 5px;">WCB 2026 <strong style="color:var(--brand-blue)">Global Community</strong></h1>
    
    <div class="action-container">
        <a href="#" target="_blank" class="reg-button">Join the Map & Register →</a>
        <p class="sub-text">Register today and see your city light up!</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><span class="num" id="count-attendees">0</span><span class="label">Registrants</span></div>
        <div class="stat-card"><span class="num" id="count-countries">0</span><span class="label">Countries</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSOjDCF8O1kJoBoigy8sl3lRLMvxVOSvg-scxdb5C1hv3usB6uwGZR9CP97fLs_E_GdNhHXidpi7Gv8/pub?output=csv';

        const map = L.map('map', {
            center: [25, 0],
            zoom: 2,
            minZoom: 2,
            zoomControl: true,
            attributionControl: false
        });

        // Soft, modern map layer
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

        const hubs = {
            'Vancouver': [49.28, -123.12], 'Calgary': [51.04, -114.07], 'Edmonton': [53.54, -113.49],
            'Ottawa': [45.42, -75.69], 'Montreal': [45.50, -73.56], 'Toronto': [43.65, -79.38],
            'Fredericton': [45.96, -66.64], 'Moncton': [46.08, -64.77], 'Halifax': [44.64, -63.57],
            'Lethbridge': [49.69, -112.84], 'Burnaby': [49.24, -122.98], 'Boston': [42.36, -71.05],
            'New York': [40.71, -74.00], 'Newark': [40.73, -74.17], 'Chicago': [41.87, -87.62],
            'Stanford': [37.42, -122.17], 'Seattle': [47.60, -122.33], 'San Diego': [32.71, -117.16],
            'Los Angeles': [34.05, -118.24], 'Atlanta': [33.74, -84.38], 'Austin': [30.26, -97.74],
            'Pittsburgh': [40.44, -79.99], 'Ann Arbor': [42.28, -83.74], 'Ames': [42.03, -93.63],
            'Iowa City': [41.66, -91.53], 'Madison': [43.07, -89.40], 'Eugene': [44.05, -123.08],
            'Salt Lake City': [40.76, -111.89], 'Denver': [39.73, -104.99], 'Philadelphia': [39.95, -75.16],
            'London': [51.50, -0.12], 'Zurich': [47.37, 8.54], 'Paris': [48.85, 2.35],
            'Amsterdam': [52.36, 4.90], 'Eindhoven': [51.44, 5.46], 'Maastricht': [50.85, 5.69],
            'Delft': [52.01, 4.35], 'Berlin': [52.52, 13.40], 'Munich': [48.13, 11.58],
            'Stuttgart': [48.77, 9.18], 'Milan': [45.46, 9.18], 'Rome': [41.90, 12.49],
            'Barcelona': [41.38, 2.17], 'Madrid': [40.41, -3.70], 'Vienna': [48.20, 16.37],
            'Bern': [46.94, 7.44], 'Lausanne': [46.51, 6.63], 'Leuven': [50.87, 4.70],
            'Galway': [53.27, -9.05], 'Dublin': [53.34, -6.26], 'Leeds': [53.80, -1.54],
            'Sheffield': [53.38, -1.47], 'Tokyo': [35.67, 139.65], 'Kyoto': [35.01, 135.76],
            'Sapporo': [43.06, 141.35], 'Seoul': [37.56, 126.97], 'Daejeon': [36.35, 127.38],
            'Singapore': [1.35, 103.81], 'Sydney': [-33.86, 151.20], 'Melbourne': [-37.81, 144.96],
            'Auckland': [-36.84, 174.76], 'Taipei': [25.03, 121.56], 'Wuhan': [30.59, 114.30],
            'Hong Kong': [22.31, 114.16], 'Beijing': [39.90, 116.40], 'Exeter': [50.71, -3.53],
            'Gwangju': [35.16, 126.85], 'Sendai': [38.26, 140.86], 'Innsbruck': [47.26, 11.40],
            'Erlangen': [49.58, 11.00], 'Goesan': [36.81, 127.79], 'Koblenz': [50.35, 7.58],
            'Bath': [51.37, -2.35], 'Providence': [41.82, -71.41], 'Cleveland': [41.49, -81.69],
            'Morgantown': [39.62, -79.95], 'Braunschweig': [52.26, 10.52], 'Nottingham': [52.95, -1.15],
            'Blacksburg': [37.22, -80.41], 'East Lansing': [42.73, -84.48], 'Tel Aviv': [32.08, 34.78]
        };

        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                const csv = await res.text();
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                
                const countries = new Set();
                let attendees = 0;
                const addedCities = new Set();

                lines.forEach(line => {
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const city = cols[0];
                    const country = cols[1];

                    if (city || country) attendees++;
                    if (country) countries.add(country);

                    if (hubs[city] && !addedCities.has(city)) {
                        const icon = L.divIcon({ 
                            className: 'ping-marker', 
                            iconSize: [18, 18],
                            iconAnchor: [9, 9] 
                        });

                        L.marker(hubs[city], { icon: icon }).addTo(map)
                         .bindTooltip(`<b>${city}</b><br>${country}`, { direction: 'top', offset: [0, -5] });
                        
                        addedCities.add(city);
                    }
                });

                document.getElementById('count-attendees').innerText = attendees;
                document.getElementById('count-countries').innerText = countries.size;

            } catch (e) { console.error("Map Error:", e); }
        }

        loadData();
    </script>
</body>
</html>
