<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCB 2026 | Research Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --deep-blue: #003366; 
            --primary-blue: #006993;
            --science-green: #7AC152;
            --accent-lime: #BDD634;
            --dark-bg: #0b0e14; 
        }
        
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        h1 { margin-top: 10px; font-weight: 800; letter-spacing: -1px; color: white; }
        p { opacity: 0.7; margin-bottom: 25px; font-size: 1.1rem; }

        /* Stats Styling with your Accent Lime */
        .stats-grid { display: flex; justify-content: center; gap: 40px; margin-bottom: 30px; }
        .num { font-size: 3.2rem; font-weight: bold; color: var(--accent-lime); display: block; line-height: 1; }
        .label { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.9; color: white; margin-top: 5px; display: block; }

        /* Professional Submit Button */
        .btn-container { margin: 20px 0 35px 0; position: relative; z-index: 1000; }
        .submit-btn {
            display: inline-block;
            background: var(--deep-blue);
            color: white;
            padding: 16px 45px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid var(--primary-blue);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 51, 102, 0.4);
        }
        .submit-btn:hover { 
            background: var(--primary-blue);
            border-color: var(--accent-lime);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(122, 193, 82, 0.3);
        }

        #map { 
            height: 650px; 
            width: 100%; 
            max-width: 1200px; 
            margin: auto; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: #0b0e14; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Scientific Green Ping Marker */
        .ping-marker {
            background: var(--science-green);
            border-radius: 50%;
            animation: pulse-science 2.5s infinite;
        }

        @keyframes pulse-science {
            0% { box-shadow: 0 0 0 0 rgba(122, 193, 82, 0.8); }
            70% { box-shadow: 0 0 0 14px rgba(122, 193, 82, 0); }
            100% { box-shadow: 0 0 0 0 rgba(122, 193, 82, 0); }
        }

        /* Tooltip & Attribution */
        .leaflet-tooltip { background: #001a33 !important; color: white !important; border: 1px solid var(--primary-blue) !important; border-radius: 6px; padding: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .leaflet-control-attribution { background: rgba(0, 0, 0, 0.7) !important; color: #777 !important; font-size: 10px; padding: 2px 8px; border-radius: 4px 0 0 0; }
        .leaflet-control-attribution a { color: var(--primary-blue) !important; text-decoration: none; }
    </style>
</head>
<body>

    <h1>WCB 2026: Where the World’s Research Meets</h1>
    <p>Visualizing the global impact of 2,800+ scientific contributions.</p>
    
    <div class="stats-grid">
        <div><span class="num" id="count-abstracts">0</span><span class="label">Total Submissions</span></div>
        <div><span class="num" id="count-nations">0</span><span class="label">Countries Represented</span></div>
    </div>

    <div class="btn-container">
        <a href="https://wcb2026.com/abstracts/submit" target="_blank" class="submit-btn">Submit Your Abstract →</a>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRcRtKUaEFYWINneAKV_F1cNlM-orCMDHerULEMLdyWNo06iWWsJ3Lz8QDvVWtBD9W_Li3iFY90F_wi/pub?output=csv';

        const map = L.map('map', { 
            center: [20, 0], 
            zoom: 2.5, 
            minZoom: 2, 
            maxZoom: 8, 
            zoomControl: false, 
            attributionControl: true 
        });
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>'
        }).addTo(map);

        // PASTE YOUR FULL HUBS LIST HERE
 const hubs = {
            'Vancouver': [49.28, -123.12], 'Calgary': [51.04, -114.07], 'Edmonton': [53.54, -113.49],
            'Ottawa': [45.42, -75.69], 'Montreal': [45.50, -73.56], 'Toronto': [43.65, -79.38],
            'Fredericton': [45.96, -66.64], 'Moncton': [46.08, -64.77], 'Halifax': [44.64, -63.57],
            'Lethbridge': [49.69, -112.84], 'Burnaby': [49.24, -122.98], 'Boston': [42.36, -71.05],
            'New York': [40.71, -74.00], 'Newark': [40.73, -74.17], 'Chicago': [41.87, -87.62],
            'Stanford': [37.42, -122.17], 'Seattle': [47.60, -122.33], 'San Diego': [32.71, -117.16],
            'Los Angeles': [34.05, -118.24], 'Atlanta': [33.74, -84.38], 'Austin': [30.26, -97.74],
            'Pittsburgh': [40.44, -79.99], 'Ann Arbor': [42.28, -83.74], 'Ames': [42.03, -93.63],
            'Iowa City': [41.66, -91.53], 'Madison': [43.07, -89.40], 'Eugene': [44.05, -123.08],
            'Salt Lake City': [40.76, -111.89], 'Denver': [39.73, -104.99], 'Philadelphia': [39.95, -75.16],
            'London': [51.50, -0.12], 'Zurich': [47.37, 8.54], 'Paris': [48.85, 2.35],
            'Amsterdam': [52.36, 4.90], 'Eindhoven': [51.44, 5.46], 'Maastricht': [50.85, 5.69],
            'Delft': [52.01, 4.35], 'Berlin': [52.52, 13.40], 'Munich': [48.13, 11.58],
            'Stuttgart': [48.77, 9.18], 'Milan': [45.46, 9.18], 'Rome': [41.90, 12.49],
            'Barcelona': [41.38, 2.17], 'Madrid': [40.41, -3.70], 'Vienna': [48.20, 16.37],
            'Bern': [46.94, 7.44], 'Lausanne': [46.51, 6.63], 'Leuven': [50.87, 4.70],
            'Galway': [53.27, -9.05], 'Dublin': [53.34, -6.26], 'Leeds': [53.80, -1.54],
            'Sheffield': [53.38, -1.47], 'Tokyo': [35.67, 139.65], 'Kyoto': [35.01, 135.76],
            'Sapporo': [43.06, 141.35], 'Seoul': [37.56, 126.97], 'Daejeon': [36.35, 127.38],
            'Singapore': [1.35, 103.81], 'Sydney': [-33.86, 151.20], 'Melbourne': [-37.81, 144.96],
            'Auckland': [-36.84, 174.76], 'Taipei': [25.03, 121.56], 'Wuhan': [30.59, 114.30],
            'Hong Kong': [22.31, 114.16], 'Beijing': [39.90, 116.40], 'Exeter': [50.71, -3.53],
            'Gwangju': [35.16, 126.85], 'Sendai': [38.26, 140.86], 'Innsbruck': [47.26, 11.40],
            'Erlangen': [49.58, 11.00], 'Goesan': [36.81, 127.79], 'Koblenz': [50.35, 7.58],
            'Bath': [51.37, -2.35], 'Providence': [41.82, -71.41], 'Cleveland': [41.49, -81.69],
            'Morgantown': [39.62, -79.95], 'Braunschweig': [52.26, 10.52], 'Nottingham': [52.95, -1.15],
            'Blacksburg': [37.22, -80.41], 'East Lansing': [42.73, -84.48], 'Tel Aviv': [32.08, 34.78]
        };


        async function loadData() {
            try {
                const res = await fetch(csvUrl);
                const csv = await res.text();
                // Split by line, remove empty lines, and skip the header row
                const lines = csv.split(/\r?\n/).filter(line => line.trim() !== "").slice(1);
                
                const countries = new Set();
                const processedCities = new Set(); 
                let submissions = 0;

                lines.forEach(line => {
                    // Split by comma and clean up quotes/spaces
                    const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
                    const city = cols[0];
                    const country = cols[1];

                    if (city || country) submissions++;
                    if (country) countries.add(country);

                    // Add a marker if the city is in our coordinate list
                    if (hubs[city] && !processedCities.has(city)) {
                        const icon = L.divIcon({ className: 'ping-marker', iconSize: [10, 10] });
                        L.marker(hubs[city], { icon: icon }).addTo(map)
                         .bindTooltip(`<b>Research Spotlight: ${city}</b><br>${country}`, { direction: 'top', offset: [0, -5] });
                        processedCities.add(city);
                    }
                });

                // Update the counters
                document.getElementById('count-abstracts').innerText = submissions.toLocaleString();
                document.getElementById('count-nations').innerText = countries.size;

            } catch (e) { 
                console.error("Data processing error:", e); 
            }
        }
        loadData();
    </script>
</body>
</html>
